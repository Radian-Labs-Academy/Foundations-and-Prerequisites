name: Verify Programs

# Compile and verify every program in the repo on every push and PR.
# Each job discovers files of its kind and skips cleanly when there are none yet,
# so the matrix grows naturally as the course adds shell, Python, C++, and ROS2 code.

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  shell:
    name: Shell scripts (bash -n + shellcheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Verify all *.sh
        shell: bash
        run: |
          set -uo pipefail
          mapfile -t files < <(find . -type f -name '*.sh' -not -path './.git/*')
          if [ "${#files[@]}" -eq 0 ]; then echo "No shell scripts found — nothing to verify."; exit 0; fi
          fail=0
          for f in "${files[@]}"; do
            echo "::group::$f"
            bash -n "$f" || { echo "syntax error in $f"; fail=1; }
            shellcheck --severity=warning "$f" || fail=1
            echo "::endgroup::"
          done
          exit "$fail"

  python:
    name: Python (py_compile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Compile all *.py
        shell: bash
        run: |
          set -uo pipefail
          mapfile -t files < <(find . -type f -name '*.py' -not -path './.git/*')
          if [ "${#files[@]}" -eq 0 ]; then echo "No Python files found — nothing to verify."; exit 0; fi
          python -m py_compile "${files[@]}"
          echo "All Python files compiled cleanly."

  cpp:
    name: C++ (g++ -std=c++17)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install g++
        run: sudo apt-get update && sudo apt-get install -y g++
      - name: Compile all standalone *.cpp / *.cc
        shell: bash
        run: |
          set -uo pipefail
          # ROS2 package sources under src/ are built by the ros2 job (colcon), not here.
          mapfile -t files < <(find . -type f \( -name '*.cpp' -o -name '*.cc' \) \
                                  -not -path './.git/*' -not -path './src/*')
          if [ "${#files[@]}" -eq 0 ]; then echo "No standalone C++ files found — nothing to verify."; exit 0; fi
          fail=0
          for f in "${files[@]}"; do
            echo "Compiling $f"
            g++ -std=c++17 -Wall -Wextra -fsyntax-only "$f" || fail=1
          done
          exit "$fail"

  execute:
    name: Execute programs & verify expected output
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck (some programs assert on tooling)
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Run golden-output tests
        shell: bash
        run: bash tests/run_all.sh

  compose:
    name: Docker Compose files (config validation)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate compose files
        shell: bash
        run: |
          set -uo pipefail
          mapfile -t files < <(find . -type f -name 'docker-compose*.yml' -not -path './.git/*')
          if [ "${#files[@]}" -eq 0 ]; then echo "No compose files found — nothing to validate."; exit 0; fi
          fail=0
          for f in "${files[@]}"; do
            echo "Validating $f"
            docker compose -f "$f" config -q || fail=1
          done
          exit "$fail"

  ros2:
    name: ROS2 packages (colcon build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Build inside the official ROS2 Jazzy image via `docker run` (checkout
      # stays on the host, which has Node for the action). Only does real work
      # once src/ contains a package.xml (Lesson 1.10+), otherwise skips.
      - name: colcon build in ros:jazzy
        shell: bash
        run: |
          set -uo pipefail
          if ! find src -name package.xml 2>/dev/null | grep -q .; then
            echo "No ROS2 packages under src/ yet — nothing to build."
            exit 0
          fi
          docker run --rm -v "$PWD":/ws -w /ws ros:jazzy bash -c '
            set -e
            apt-get update -qq
            apt-get install -y -qq python3-colcon-common-extensions
            . /opt/ros/jazzy/setup.sh
            colcon build --event-handlers console_direct+
          '
